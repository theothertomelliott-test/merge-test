name: Checks

on:
  workflow_dispatch:
  pull_request:
  merge_group:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Log current commit
        run: |
          echo "Current commit hash: $(git rev-parse HEAD)"
